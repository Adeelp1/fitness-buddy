<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
  "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>View Allocated Batches</title>

<style>
body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

.container {
    width: 90%;
    margin: 40px auto;
}

.title {
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    color: #2e7d32;
    margin-bottom: 20px;
}

/* Table Card */
.card {
    background: #ffffff;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0px 4px 10px rgba(0,0,0,0.08);
}

/* Table Styling */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #2e7d32;
    color: white;
    padding: 12px;
    text-align: center;
}

td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}

/* Row hover */
tr:hover {
    background-color: #f1f8f4;
}

/* Remove Button */
.btn-remove {
    background: #e53935;
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
    transition: 0.3s;
}

.btn-remove:hover {
    background: #c62828;
}

/* Responsive */
@media (max-width: 768px) {
    table, thead, tbody, th, td, tr {
        display: block;
    }

    th {
        display: none;
    }

    tr {
        margin-bottom: 15px;
        background: #fff;
        padding: 10px;
        border-radius: 8px;
    }

    td {
        text-align: left;
        padding: 8px;
        position: relative;
    }

    td::before {
        font-weight: bold;
        display: block;
    }

    td:nth-child(1)::before { content: "SLNO"; }
    td:nth-child(2)::before { content: "Batch"; }
    td:nth-child(3)::before { content: "From Time"; }
    td:nth-child(4)::before { content: "To Time"; }
    td:nth-child(5)::before { content: "Action"; }
}
</style>

</head>

<body>
<div class="container">
    <div class="title">Allocated Batches</div>

    <div class="card">
        <form id="form1" name="form1" method="post" action="">
            <table>
                <tr>
                    <th>SLNO</th>
                    <th>Batch</th>
                    <th>From Time</th>
                    <th>To Time</th>
                    <th>Action</th>
                </tr>

                {% for i in data %}
                <tr>
                    <td>{{ forloop.counter }}</td>
                    <td>{{ i.BATCH.batch }}</td>
                    <td>{{ i.BATCH.from_time }}</td>
                    <td>{{ i.BATCH.to_time }}</td>
                    <td>
                        <a href="/removeAllocatedBatch/{{ i.id }}" class="btn-remove">
                            Remove
                        </a>
                    </td>
                </tr>
                {% endfor %}

            </table>
        </form>
    </div>
</div>
</body>
</html>

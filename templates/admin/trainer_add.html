<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Add Trainer</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* Center container */
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Card */
.container {
    width: 100%;
    max-width: 700px;
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

/* Form */
.form-group {
    margin-bottom: 15px;
}

label {
    font-weight: 600;
    display: block;
    margin-bottom: 5px;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    transition: 0.3s;
}

input:focus {
    border-color: #22c55e;
    box-shadow: 0 0 5px rgba(34,197,94,0.3);
}

/* Row */
.row {
    display: flex;
    gap: 30px;   /* increased space between fields */
    margin-bottom: 5px;
}

.row .form-group {
    flex: 1;
}

/* Button */
.btn {
    width: 100%;
    padding: 12px;
    background: #22c55e;
    border: none;
    color: white;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.btn:hover {
    background: #16a34a;
}

/* Image preview */
.preview {
    width: 100px;
    height: 100px;
    border-radius: 10px;
    object-fit: cover;
    margin-top: 10px;
    display: none;
}

@media(max-width: 600px){
    .row {
        flex-direction: column;
    }
}
</style>

<script>
function previewImage(event) {
    const img = document.getElementById("previewImg");
    img.src = URL.createObjectURL(event.target.files[0]);
    img.style.display = "block";
}

function validateForm() {
    let phone = document.forms["form1"]["textfield3"].value;
    let email = document.forms["form1"]["textfield4"].value;

    let phonePattern = /^[0-9]{10}$/;
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

    if (!phone.match(phonePattern)) {
        alert("Enter valid 10-digit phone number");
        return false;
    }

    if (!email.match(emailPattern)) {
        alert("Enter valid email");
        return false;
    }

    return true;
}
</script>

</head>

<body>

<div class="wrapper">
<div class="container">

    <h2>Add Trainer</h2>

    <form id="form1" name="form1" method="post" action="/addTrainer_post"
          enctype="multipart/form-data" onsubmit="return validateForm()">

        <div class="form-group">
            <label>Name</label>
            <input type="text" name="textfield1" required>
        </div>

        <div class="form-group">
            <label>Place</label>
            <input type="text" name="textfield2" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="textfield3" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="text" name="textfield4" required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Post</label>
                <input type="text" name="textfield5">
            </div>

            <div class="form-group">
                <label>Pin</label>
                <input type="text" name="textfield6">
            </div>
        </div>

        <div class="form-group">
            <label>Photo</label>
            <input type="file" name="photo" onchange="previewImage(event)">
            <img id="previewImg" class="preview">
        </div>

        <div class="form-group">
            <label>Join Date</label>
            <input type="date" name="textfield8">
        </div>

        <div class="form-group">
            <label>Bio</label>
            <input type="text" name="textfield9">
        </div>

        <button type="submit" class="btn">Add Trainer</button>

    </form>

</div>
</div>

</body>
</html>

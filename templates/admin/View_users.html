<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>View Users</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f8f7;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 95%;
        margin: 30px auto;
    }

    h2 {
        text-align: center;
        color: #2e7d32;
        margin-bottom: 20px;
    }

    /* Search Bar */
    .top-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
    }

    .search-box {
        padding: 8px;
        width: 250px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    /* Table */
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    th {
        background-color: #2e7d32;
        color: white;
        padding: 12px;
        font-size: 14px;
    }

    td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #ddd;
        font-size: 13px;
    }

    tr:hover {
        background-color: #f1f1f1;
    }

    /* Buttons */
    .btn {
        padding: 6px 10px;
        border: none;
        border-radius: 4px;
        text-decoration: none;
        color: white;
        font-size: 12px;
        display: inline-block;
        margin: 2px;
    }

    .btn-allocate {
        background-color: #388e3c;
    }

    .btn-view {
        background-color: #1976d2;
    }

    .btn:hover {
        opacity: 0.85;
    }

    /* Responsive */
    @media (max-width: 900px) {
        table {
            font-size: 12px;
        }
        .search-box {
            width: 150px;
        }
    }
</style>

</head>

<body>

<div class="container">

    <h2>Users Management</h2>

    <div class="top-bar">
        <input type="text" class="search-box" placeholder="Search users..." onkeyup="searchTable()" />
    </div>

    <form method="post">
        <table id="userTable">
            <tr>
                <th>SLNO</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Gender</th>
                <th>Photo</th>
                <th>DOB</th>
                <th>BIO</th>
                <th>Level</th>
                <!-- <th>Login</th> -->
                <th>Batch</th>
                <th>Action</th>
            </tr>

            {% for i in data %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.name }}</td>
                <td>{{ i.email }}</td>
                <td>{{ i.phone }}</td>
                <td>{{ i.gender }}</td>
                <td>
                    <img src="{{ i.photo }}" width="50" height="50" style="border-radius:50%;" />
                </td>
                <td>{{ i.dob }}</td>
                <td>{{ i.bio }}</td>
                <td>{{ i.level }}</td>
                <!-- <td>{{ i.LOGIN }}</td> -->
                <td>{{ i.BATCH.batch }}</td>
                <td>
                    <a href="/AllocateUserToTrainer/{{ i.id }}" class="btn btn-allocate">Allocate</a>
                    <a href="/viewAllocatedTrainer/{{ i.id }}" class="btn btn-view">View Trainer</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </form>

</div>

<script>
function searchTable() {
    let input = document.querySelector(".search-box").value.toLowerCase();
    let rows = document.querySelectorAll("#userTable tr");

    for (let i = 1; i < rows.length; i++) {
        let text = rows[i].innerText.toLowerCase();
        rows[i].style.display = text.includes(input) ? "" : "none";
    }
}
</script>

</body>
</html>

<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Payment Report</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background-color: #f4f6f9;
    }

    /* Header */
    .header {
        background-color: #2e7d32;
        color: white;
        padding: 15px 20px;
        font-size: 22px;
        font-weight: bold;
    }

    /* Container */
    .container {
        width: 90%;
        max-width: 900px;
        margin: 30px auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .title {
        font-size: 20px;
        margin-bottom: 15px;
        color: #2e7d32;
        font-weight: bold;
    }

    /* Table */
    table {
        width: 100%;
        border-collapse: collapse;
    }

    table th {
        background-color: #2e7d32;
        color: white;
        padding: 10px;
        text-align: center;
    }

    table td {
        padding: 10px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    table tr:hover {
        background-color: #f1f1f1;
    }

    /* Responsive */
    @media screen and (max-width: 600px) {
        table th, table td {
            font-size: 12px;
            padding: 8px;
        }
    }
</style>

</head>

<body>

<div>
{#    Admin Panel - Payment Report#}
</div>

<div class="container">
    <div class="title">Payment Report</div>

    <form id="form1" name="form1" method="post" action="">
        <table>
            <tr>
                <th>SL NO</th>
                <th>Date</th>
                <th>User Name</th>
                <th>Amount</th>
            </tr>

            {% for i in data %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.date }}</td>
                <td>{{ i.USER.name }}</td>
                <td>{{ i.amount }}</td>
            </tr>
            {% endfor %}

        </table>
    </form>
</div>

</body>
</html>

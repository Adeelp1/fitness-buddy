<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Change Password</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 400px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    padding: 30px;
}

.card h2 {
    text-align: center;
    color: #2e7d32;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    font-weight: bold;
    display: block;
    margin-bottom: 5px;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.form-group input:focus {
    border-color: #2e7d32;
}

.error {
    color: red;
    font-size: 13px;
}

.success {
    color: green;
    text-align: center;
    margin-bottom: 10px;
}

.btn {
    width: 100%;
    padding: 12px;
    background-color: #2e7d32;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

.btn:hover {
    background-color: #1b5e20;
}
</style>

<script>
function validateForm() {
    let current = document.forms["form1"]["current_password"].value;
    let newPass = document.forms["form1"]["new_password"].value;
    let confirm = document.forms["form1"]["confirm_password"].value;

    let valid = true;

    // Clear old errors
    document.getElementById("currentError").innerHTML = "";
    document.getElementById("newError").innerHTML = "";
    document.getElementById("confirmError").innerHTML = "";

    // Current password check
    if (current === "") {
        document.getElementById("currentError").innerHTML = "Enter current password";
        valid = false;
    }

    // New password rules
    let strongRegex = /^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*]).{6,}$/;

    if (!strongRegex.test(newPass)) {
        document.getElementById("newError").innerHTML =
            "Password must contain 1 uppercase, 1 number, 1 special char & min 6 chars";
        valid = false;
    }

    // Confirm password match
    if (newPass !== confirm) {
        document.getElementById("confirmError").innerHTML = "Passwords do not match";
        valid = false;
    }

    return valid;
}
</script>

</head>

<body>

<div class="container">
    <div class="card">
        <h2>Change Password</h2>

        <form name="form1" method="post" action="/change_password_post" onsubmit="return validateForm()">

            <div class="form-group">
                <label>Current Password</label>
                <input type="password" name="current_password">
                <div id="currentError" class="error"></div>
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="new_password">
                <div id="newError" class="error"></div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password">
                <div id="confirmError" class="error"></div>
            </div>

            <button type="submit" class="btn">Update Password</button>

        </form>
    </div>
</div>

</body>
</html>

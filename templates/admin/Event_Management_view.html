<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>View Events</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f7f2;
    margin: 0;
}

/* Container */
.container {
    width: 95%;
    margin: 30px auto;
}

/* Header */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.header h2 {
    margin: 0;
    color: #333;
}

/* Add Button */
.add-btn {
    background: #4CAF50;
    color: white;
    padding: 10px 18px;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
}

.add-btn:hover {
    background: #45a049;
}

/* Search Bar */
.search-box {
    margin-bottom: 15px;
}

.search-box input {
    width: 250px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* Card */
.card {
    background: #ffffff;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}

thead {
    background: #4CAF50;
    color: white;
}

th, td {
    padding: 12px;
    text-align: center;
    font-size: 14px;
}

tbody tr {
    border-bottom: 1px solid #eee;
}

tbody tr:hover {
    background: #e8f5e9;
}

/* Action buttons */
.action-btn {
    padding: 6px 10px;
    border-radius: 5px;
    text-decoration: none;
    font-size: 13px;
    margin: 0 3px;
}

.edit-btn {
    background: #43a047;
    color: white;
}

.edit-btn:hover {
    background: #2e7d32;
}

.delete-btn {
    background: #c62828;
    color: white;
}

.delete-btn:hover {
    background: #8e0000;
}

/* Responsive */
@media (max-width: 768px) {
    .search-box input {
        width: 100%;
    }
}
</style>

<script>
function searchTable() {
    let input = document.getElementById("searchInput").value.toLowerCase();
    let rows = document.querySelectorAll("tbody tr");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? "" : "none";
    });
}
</script>

</head>

<body>

<div class="container">

    <div class="header">
        <h2>Manage Events</h2>
        <a href="/addEvent" class="add-btn">+ Add Event</a>
    </div>

    <!-- Search Bar -->
    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="searchTable()" placeholder="Search events...">
    </div>

    <div class="card">
        <form id="form1" name="form1" method="post" action="">
            <table>
                <thead>
                    <tr>
                        <th>Sl No</th>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Venue</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody>
                    {% for i in data %}
                    <tr>
                        <td>{{ forloop.counter }}</td>
                        <td>{{ i.title }}</td>
                        <td>{{ i.description }}</td>
                        <td>{{ i.venue }}</td>
                        <td>{{ i.date }}</td>
                        <td>{{ i.time }}</td>
                        <td>
                            <a href="/editEvent/{{ i.id }}" class="action-btn edit-btn">Edit</a>
                            <a href="/viewEvent_delete/{{ i.id }}" class="action-btn delete-btn">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>
        </form>
    </div>

</div>

</body>
</html>

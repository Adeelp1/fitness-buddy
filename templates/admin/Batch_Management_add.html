<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Add Batch</title>

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(rgba(0,0,0,0.85), rgba(120,0,0,0.9)),
                    url('https://images.unsplash.com/photo-1558611848-73f7eb4001a1?auto=format&fit=crop&w=1470&q=80');
        background-size: cover;
        background-position: center;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .form-container {
        background: rgba(0,0,0,0.75);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 0 25px rgba(255,0,0,0.4);
        width: 350px;
        backdrop-filter: blur(10px);
    }

    h2 {
        text-align: center;
        color: #fff;
        margin-bottom: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th {
        text-align: left;
        color: #ddd;
        padding: 10px 0;
        font-weight: 500;
    }

    td {
        padding-bottom: 15px;
    }

    input[type="text"] {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        outline: none;
        background: rgba(255,255,255,0.1);
        color: #fff;
        font-size: 14px;
        transition: 0.3s;
    }

    input[type="text"]:focus {
        background: rgba(255,255,255,0.2);
        box-shadow: 0 0 8px rgba(255,0,0,0.6);
    }

    input[type="submit"] {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(45deg, #ff0000, #990000);
        color: #fff;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    input[type="submit"]:hover {
        transform: scale(1.05);
        box-shadow: 0 0 10px rgba(255,0,0,0.7);
    }
</style>

</head>

<body>

<div class="form-container">
<h2>Add Batch</h2>

<form id="form1" name="form1" method="post" action="/addBatch_post">
  <table>
    <tr>
      <th scope="row">Batch</th>
      <td>
      <input type="text" name="textfield1" id="textfield1" required />
      </td>
    </tr>
    <tr>
      <th scope="row">From Time</th>
      <td>
      <input type="text" name="textfield2" id="textfield2" required />
      </td>
    </tr>
    <tr>
      <th scope="row">To Time</th>
      <td>
      <input type="text" name="textfield3" id="textfield3" required />
      </td>
    </tr>
    <tr>
      <th colspan="2">
        <input type="submit" name="button" id="button" value="Add" required />
      </th>
    </tr>
  </table>
</form>

</div>

</body>
</html>

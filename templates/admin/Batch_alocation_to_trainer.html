<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Allocate Batch</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        background: linear-gradient(rgba(0,0,0,0.85), rgba(120,0,0,0.9)),
                    url('https://images.unsplash.com/photo-1558611848-73f7eb4001a1') no-repeat center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 90%;
        max-width: 1000px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.6);
        color: white;
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: 600;
        color: #ff4d4d;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        overflow: hidden;
        border-radius: 12px;
    }

    th {
        background: rgba(255, 0, 0, 0.7);
        padding: 12px;
        font-weight: 500;
        text-align: center;
    }

    td {
        padding: 12px;
        text-align: center;
        background: rgba(255,255,255,0.05);
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    tr:hover td {
        background: rgba(255, 0, 0, 0.2);
        transition: 0.3s;
    }

    a {
        text-decoration: none;
        padding: 8px 14px;
        border-radius: 8px;
        background: #ff4d4d;
        color: white;
        font-size: 14px;
        transition: 0.3s;
    }

    a:hover {
        background: #ff1a1a;
        box-shadow: 0 0 10px #ff4d4d;
    }

    @media (max-width: 768px) {
        table, thead, tbody, th, td, tr {
            display: block;
        }

        th {
            display: none;
        }

        tr {
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
        }

        td {
            text-align: left;
            padding: 10px;
        }

        td::before {
            content: attr(data-label);
            font-weight: bold;
            display: block;
            color: #ff4d4d;
        }
    }
</style>

</head>

<body>

<div class="container">
    <h2>Allocate Batch to Trainer</h2>

    <form method="post">
        <table>
            <thead>
                <tr>
                    <th>SLNO</th>
                    <th>Batch</th>
                    <th>From Time</th>
                    <th>To Time</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for i in data %}
                <tr>
                    <td data-label="SLNO">{{ forloop.counter }}</td>
                    <td data-label="Batch">{{ i.batch }}</td>
                    <td data-label="From Time">{{ i.from_time }}</td>
                    <td data-label="To Time">{{ i.to_time }}</td>
                    <td data-label="Action">
                        <a href="/allocate_batch_to_trainer/{{ i.id }}">Allocate</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </form>
</div>

</body>
</html>

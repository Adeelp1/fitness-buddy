<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Edit Event</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f8f7;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 450px;
        margin: 60px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        color: #2e7d32;
        margin-bottom: 25px;
    }

    label {
        font-weight: bold;
        color: #333;
        display: block;
        margin-bottom: 5px;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
    }

    input:focus, textarea:focus {
        border-color: #2e7d32;
        outline: none;
    }

    .btn {
        width: 100%;
        padding: 12px;
        background-color: #2e7d32;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background-color: #1b5e20;
    }

    .error {
        color: red;
        font-size: 13px;
        margin-top: -10px;
        margin-bottom: 10px;
        display: none;
    }
</style>

<script>
function validateForm() {
    let title = document.forms["form1"]["textfield1"].value.trim();
    let desc = document.forms["form1"]["textarea"].value.trim();
    let venue = document.forms["form1"]["textfield2"].value.trim();
    let date = document.forms["form1"]["textfield3"].value.trim();
    let time = document.forms["form1"]["textfield4"].value.trim();

    let valid = true;

    document.querySelectorAll(".error").forEach(e => e.style.display = "none");

    if (title === "") {
        document.getElementById("errTitle").style.display = "block";
        valid = false;
    }

    if (desc === "") {
        document.getElementById("errDesc").style.display = "block";
        valid = false;
    }

    if (venue === "") {
        document.getElementById("errVenue").style.display = "block";
        valid = false;
    }

    if (date === "") {
        document.getElementById("errDate").style.display = "block";
        valid = false;
    }

    if (time === "") {
        document.getElementById("errTime").style.display = "block";
        valid = false;
    }

    return valid;
}
</script>

</head>

<body>

<div class="container">
    <h2>Edit Event</h2>

    <form id="form1" name="form1" method="post" action="/editEvent_post/{{ data.id }}" onsubmit="return validateForm()">

        <label>Title</label>
        <input type="text" name="textfield1" value="{{ data.title }}">
        <div id="errTitle" class="error">Title is required</div>

        <label>Description</label>
        <textarea name="textarea" rows="4">{{ data.description }}</textarea>
        <div id="errDesc" class="error">Description is required</div>

        <label>Venue</label>
        <input type="text" name="textfield2" value="{{ data.venue }}">
        <div id="errVenue" class="error">Venue is required</div>

        <label>Date</label>
        <input type="date" name="textfield3" value="{{ data.date }}">
        <div id="errDate" class="error">Date is required</div>

        <label>Time</label>
        <input type="time" name="textfield4" value="{{ data.time }}">
        <div id="errTime" class="error">Time is required</div>

        <button type="submit" class="btn">Update Event</button>

    </form>
</div>

</body>
</html>

<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Edit Batch</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f7f6;
}

.container {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: #ffffff;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
    width: 400px;
}

.card h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #2e7d32;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #333;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

.form-group input:focus {
    border-color: #4CAF50;
    box-shadow: 0 0 5px rgba(76,175,80,0.3);
}

.error {
    color: red;
    font-size: 13px;
    display: none;
}

.btn {
    width: 100%;
    padding: 12px;
    background: #4CAF50;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #388e3c;
}
</style>

<script>
function validateForm() {
    let batch = document.getElementById("textfield1");
    let from = document.getElementById("textfield2");
    let to = document.getElementById("textfield3");

    let valid = true;

    // Reset errors
    document.getElementById("batchError").style.display = "none";
    document.getElementById("fromError").style.display = "none";
    document.getElementById("toError").style.display = "none";

    if (batch.value.trim() === "") {
        document.getElementById("batchError").style.display = "block";
        valid = false;
    }

    if (from.value === "") {
        document.getElementById("fromError").style.display = "block";
        valid = false;
    }

    if (to.value === "") {
        document.getElementById("toError").style.display = "block";
        valid = false;
    }

    // Time validation (from < to)
    if (from.value && to.value && from.value >= to.value) {
        alert("From Time must be less than To Time");
        valid = false;
    }

    return valid;
}
</script>

</head>

<body>

<div class="container">
    <div class="card">
        <h2>Edit Batch</h2>

        <form id="form1" name="form1" method="post" action="/editBatch_post/{{ data.id }}" onsubmit="return validateForm()">
            
            <div class="form-group">
                <label>Batch</label>
                <input type="text" name="textfield1" id="textfield1" value="{{ data.batch }}" required />
                <div id="batchError" class="error">Batch name is required</div>
            </div>

            <div class="form-group">
                <label>From Time</label>
                <input type="time" name="textfield2" id="textfield2" value="{{ data.from_time }}" required />
                <div id="fromError" class="error">From time is required</div>
            </div>

            <div class="form-group">
                <label>To Time</label>
                <input type="time" name="textfield3" id="textfield3" value="{{ data.to_time }}" required />
                <div id="toError" class="error">To time is required</div>
            </div>

            <input type="submit" name="button" id="button" value="Update Batch" class="btn" />

        </form>
    </div>
</div>

</body>
</html>

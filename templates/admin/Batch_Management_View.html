<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>View Batches</title>

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(rgba(0,0,0,0.85), rgba(120,0,0,0.9)),
                    url('https://images.unsplash.com/photo-1571902943202-507ec2618e8f');
        background-size: cover;
        background-position: center;
        color: white;
    }

    .container {
        width: 90%;
        max-width: 900px;
        margin: 60px auto;
        padding: 30px;
        border-radius: 15px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        box-shadow: 0 0 25px rgba(0,0,0,0.6);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        letter-spacing: 1px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        text-align: center;
    }

    th {
        background: rgba(255, 0, 0, 0.7);
        padding: 12px;
        font-size: 15px;
        text-transform: uppercase;
    }

    td {
        padding: 12px;
        background: rgba(255, 255, 255, 0.05);
    }

    tr:nth-child(even) td {
        background: rgba(255, 255, 255, 0.08);
    }

    tr:hover td {
        background: rgba(255, 0, 0, 0.2);
        transition: 0.3s;
    }

    a {
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 5px;
        font-size: 13px;
        display: inline-block;
        margin: 2px;
    }

    a[href*="edit"] {
        background: #28a745;
        color: white;
    }

    a[href*="delete"] {
        background: #dc3545;
        color: white;
    }

    a:hover {
        opacity: 0.8;
    }

</style>
</head>

<body>

<div class="container">
    <h2>Batch Details</h2>

    <form id="form1" name="form1" method="post" action="">
      <table border="0">
        <tr>
          <th>SlNo</th>
          <th>Batch</th>
          <th>From Time</th>
          <th>To Time</th>
          <th>Action</th>
        </tr>

        {% for i in data %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>{{ i.batch }}</td>
          <td>{{ i.from_time }}</td>
          <td>{{ i.to_time }}</td>
          <td>
            <a href="/editBatch/{{ i.id }}">Edit</a>
            <a href="/ViewBatch_delete/{{ i.id }}">Remove</a>
          </td>
        </tr>
        {% endfor %}

      </table>
    </form>
</div>

</body>
</html>

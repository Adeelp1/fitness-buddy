<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>View Batches</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f7f6;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 90%;
        margin: 30px auto;
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
    }

    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .header h2 {
        color: #2e7d32;
        margin: 0;
    }

    .add-btn {
        background-color: #2e7d32;
        color: #fff;
        padding: 8px 15px;
        text-decoration: none;
        border-radius: 5px;
        font-size: 14px;
    }

    .add-btn:hover {
        background-color: #1b5e20;
    }

    .search-bar {
        margin-bottom: 15px;
    }

    .search-bar input {
        width: 100%;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    table th {
        background-color: #2e7d32;
        color: white;
        padding: 10px;
        text-align: left;
    }

    table td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
    }

    table tr:hover {
        background-color: #f1f1f1;
    }

    .action a {
        text-decoration: none;
        padding: 5px 10px;
        border-radius: 4px;
        font-size: 12px;
    }

    .edit-btn {
        background-color: #0288d1;
        color: white;
    }

    .delete-btn {
        background-color: #d32f2f;
        color: white;
    }

</style>

</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h2>Batch Management</h2>
        <a href="/addBatch" class="add-btn">+ Add Batch</a>
    </div>

    <!-- Search -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search batches...">
    </div>

    <!-- Table -->
    <form id="form1" name="form1" method="post" action="">
        <table id="batchTable">
            <tr>
                <th>SlNo</th>
                <th>Batch</th>
                <th>From Time</th>
                <th>To Time</th>
                <th>Action</th>
            </tr>

            {% for i in data %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>{{ i.batch }}</td>
                <td>{{ i.from_time }}</td>
                <td>{{ i.to_time }}</td>
                <td class="action">
                    <a href="/editBatch/{{ i.id }}" class="edit-btn">Edit</a>
                    <a href="/ViewBatch_delete/{{ i.id }}" class="delete-btn">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </form>

</div>

<!-- Simple Frontend Search -->
<script>
    const searchInput = document.getElementById("searchInput");
    searchInput.addEventListener("keyup", function() {
        let filter = searchInput.value.toLowerCase();
        let rows = document.querySelectorAll("#batchTable tr");

        rows.forEach((row, index) => {
            if(index === 0) return; // skip header
            let text = row.innerText.toLowerCase();
            row.style.display = text.includes(filter) ? "" : "none";
        });
    });
</script>

</body>
</html>

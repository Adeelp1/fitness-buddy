<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Trainer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.9)),
                    url('https://images.unsplash.com/photo-1554284126-aa88f22d8b74');
        background-size: cover;
        background-position: center;

        /* 🔥 FIX */
        min-height: 100vh;
        overflow-y: auto;

        display: flex;
        justify-content: center;
        align-items: flex-start; /* changed */
        padding: 40px 15px; /* space around */
    }

    .container {
        background: rgba(0,0,0,0.75);
        padding: 25px;
        border-radius: 15px;

        /* 🔥 FIX */
        width: 100%;
        max-width: 450px;

        box-shadow: 0 0 25px rgba(255,0,0,0.4);
    }

    h2 {
        text-align: center;
        color: #ff3c3c;
        margin-bottom: 20px;
    }

    label {
        color: #fff;
        font-size: 14px;
        margin-bottom: 5px;
        display: block;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-bottom: 12px;
        border: none;
        border-radius: 8px;
        background: #1c1c1c;
        color: #fff;
        outline: none;
    }

    input[type="file"] {
        padding: 6px;
    }

    .photo-preview {
        text-align: center;
        margin-bottom: 10px;
    }

    .photo-preview img {
        width: 90px;
        height: 90px;
        border-radius: 10px;
        border: 2px solid #ff3c3c;
        object-fit: cover;
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: #ff3c3c;
        border: none;
        border-radius: 8px;
        color: #fff;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #cc0000;
    }

    /* 🔥 MOBILE FIX */
    @media (max-height: 600px) {
        body {
            align-items: flex-start;
        }
    }

</style>
</head>

<body>

<div class="container">
    <h2>Edit Trainer</h2>

    <form method="post" action="/editTrainer_post/{{ data.id }}" enctype="multipart/form-data">

        <label>Name</label>
        <input type="text" name="textfield1" value="{{ data.name }}" required>

        <label>Place</label>
        <input type="text" name="textfield2" value="{{ data.place }}" required>

        <label>Phone Number</label>
        <input type="text" name="textfield3" value="{{ data.p_no }}" required>

        <label>Email</label>
        <input type="text" name="textfield4" value="{{ data.email }}" required>

        <label>Post</label>
        <input type="text" name="textfield5" value="{{ data.post }}">

        <label>PIN Code</label>
        <input type="text" name="textfield6" value="{{ data.pin }}">

        <label>Current Photo</label>
        <div class="photo-preview">
            <img src="{{ data.photo }}" alt="Trainer Photo">
        </div>

        <label>Change Photo</label>
        <input type="file" name="photo">

        <label>Join Date</label>
        <input type="date" name="textfield8" value="{{ data.join_date }}">

        <label>Bio</label>
        <input type="text" name="textfield9" value="{{ data.bio }}">

        <button type="submit" class="btn">Update Trainer</button>

    </form>
</div>

</body>
</html>

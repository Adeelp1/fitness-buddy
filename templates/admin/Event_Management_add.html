<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Event</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f6f9;
    }

    .container {
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: #fff;
        padding: 30px 40px;
        border-radius: 12px;
        width: 420px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    .card h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #333;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #555;
    }

    input[type="text"],
    textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        transition: 0.3s;
    }

    input:focus,
    textarea:focus {
        border-color: #4CAF50;
        outline: none;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
    }

    textarea {
        resize: none;
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: #4CAF50;
        border: none;
        color: #fff;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #45a049;
    }
</style>

</head>

<body>

<div class="container">
    <div class="card">
        <h2>Add Event</h2>

        <form id="form1" name="form1" method="post" action="/addEvent_post">

            <div class="form-group">
                <label>Title</label>
                <input type="text" name="textfield1" id="textfield1" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="textarea2" id="textarea2" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label>Venue</label>
                <input type="text" name="textfield3" id="textfield3" required>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" name="textfield4" id="textfield4" required>
            </div>

            <div class="form-group">
                <label>Time</label>
                <input type="time" name="textfield5" id="textfield5" required>
            </div>

            <button type="submit" class="btn">Add Event</button>

        </form>
    </div>
</div>

</body>
</html>

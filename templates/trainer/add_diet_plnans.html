<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Diet Plan</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;

        /* 🔥 Gym Background Image */
        background: 
            linear-gradient(rgba(0,0,0,0.85), rgba(30,0,0,0.9)),
            url('https://images.unsplash.com/photo-1558611848-73f7eb4001a1');

        background-size: cover;
        background-position: center;
        height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    /* Glass Card */
    .container {
        width: 420px;
        padding: 30px;
        border-radius: 15px;

        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(12px);

        border: 1px solid rgba(255, 0, 0, 0.3);
        box-shadow: 
            0 0 25px rgba(255, 0, 0, 0.4),
            0 0 60px rgba(255, 0, 0, 0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: 600;
        letter-spacing: 2px;
        color: #ff1a1a;
        text-shadow: 0 0 12px rgba(255, 0, 0, 0.8);
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        font-size: 14px;
        color: #ccc;
        display: block;
        margin-bottom: 6px;
    }

    input, textarea, select {
        width: 100%;
        padding: 11px;
        border-radius: 8px;
        border: 1px solid #222;
        background: #0a0a0a;
        color: white;
        outline: none;
        transition: 0.3s;
    }

    input:focus, textarea:focus, select:focus {
        border-color: #ff1a1a;
        box-shadow: 0 0 12px #ff1a1a;
    }

    textarea {
        resize: none;
        height: 85px;
    }

    /* Button */
    .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 8px;

        background: linear-gradient(90deg, #ff0000, #660000);
        color: white;
        font-size: 16px;
        font-weight: bold;
        letter-spacing: 1px;

        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px #ff0000;
    }

</style>

</head>

<body>

<div class="container">
    <h2>ADD DIET PLAN</h2>

    <form method="post" action="/add_diet_plans_post">
        {% csrf_token %}

        <div class="form-group">
            <label>Food Name</label>
            <input type="text" name="food_name" required>
        </div>

        <div class="form-group">
            <label>Details</label>
            <textarea name="details" required></textarea>
        </div>

        <div class="form-group">
            <label>Time</label>
            <input type="time" name="time" required>
        </div>

        <div class="form-group">
            <label>Day</label>
            <select name="day" required>
                <option value="">--Select Day--</option>
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
                <option>Saturday</option>
                <option>Sunday</option>
            </select>
        </div>

        <input type="hidden" name="id" value="{{ id }}">

        <button type="submit" class="btn">ADD PLAN</button>
    </form>
</div>

</body>
</html>

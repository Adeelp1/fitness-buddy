<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Workout Videos</title>

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #000000, #1a0000);
        color: #fff;
    }

    .container {
        width: 90%;
        margin: 40px auto;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #ff0000;
        text-shadow: 0 0 10px rgba(255,0,0,0.7);
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(10px);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 0 15px rgba(255,0,0,0.3);
    }

    th {
        background: #ff0000;
        padding: 12px;
        text-align: center;
        font-weight: 600;
    }

    td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    tr:hover {
        background: rgba(255,0,0,0.1);
    }

    a {
        text-decoration: none;
        color: #fff;
        font-weight: 500;
    }

    .btn {
        padding: 6px 12px;
        border-radius: 6px;
        margin: 2px;
        display: inline-block;
        transition: 0.3s;
    }

    .view {
        background: #333;
    }

    .view:hover {
        background: #555;
    }

    .edit {
        background: #ff0000;
        box-shadow: 0 0 8px rgba(255,0,0,0.6);
    }

    .edit:hover {
        background: #cc0000;
    }

    .delete {
        background: #660000;
    }

    .delete:hover {
        background: #990000;
    }

</style>
</head>

<body>

<div class="container">
    <h2>Workout Videos</h2>

    <form id="form1" name="form1" method="post" action="">
        <table>
            <tr>
                <th>S.No</th>
                <th>Video</th>
                <th>Title</th>
                <th>Date</th>
                <th>Action</th>
            </tr>

            {% for i in data %}
            <tr>
                <td>{{ forloop.counter }}</td>
                <td>
                    <a href="{{ i.video }}" target="_blank" class="btn view">View</a>
                </td>
                <td>{{ i.title }}</td>
                <td>{{ i.date }}</td>
                <td>
                    <a href="/workoutVideoEdit/{{i.id}}" class="btn edit">Edit</a>
                    <a href="/workoutVideoDelete/{{i.id}}" class="btn delete">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </form>
</div>

</body>
</html>

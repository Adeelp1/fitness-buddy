<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>View Profile</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #000000, #1a0000);
    color: white;
}

/* Navbar (optional if you already have one) */
.navbar {
    padding: 15px 30px;
    background: #0a0a0a;
    border-bottom: 2px solid red;
    font-size: 20px;
    font-weight: bold;
    color: red;
}

/* Container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

/* Card */
.profile-card {
    background: #111;
    border-radius: 15px;
    padding: 30px;
    width: 500px;
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.3);
}

/* Title */
.profile-title {
    text-align: center;
    font-size: 28px;
    margin-bottom: 20px;
    color: red;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    padding: 10px;
    color: #ff4d4d;
    width: 35%;
}

td {
    padding: 10px;
    color: #ddd;
}

/* Divider */
tr {
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* Profile Image */
.profile-img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid red;
}

/* Center image */
.img-cell {
    text-align: center;
}
</style>

</head>

<body>

<div class="navbar">
    View Profile
</div>

<div class="container">
    <div class="profile-card">
        <div class="profile-title">My Profile</div>

        <form id="form1" name="form1" method="post" action="">
            <table>

                <tr>
                    <td colspan="2" class="img-cell">
                        <img src="{{ data.0.photo }}" class="profile-img" />
                    </td>
                </tr>

                <tr>
                    <th>Name</th>
                    <td>{{ data.0.name }}</td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>{{ data.0.email }}</td>
                </tr>

                <tr>
                    <th>Phone</th>
                    <td>{{ data.0.phone }}</td>
                </tr>

                <tr>
                    <th>Place</th>
                    <td>{{ data.0.place }}</td>
                </tr>

                <tr>
                    <th>Pin</th>
                    <td>{{ data.0.pin }}</td>
                </tr>

                <tr>
                    <th>Post</th>
                    <td>{{ data.0.post }}</td>
                </tr>

                <tr>
                    <th>Join Date</th>
                    <td>{{ data.0.join_date }}</td>
                </tr>

                <tr>
                    <th>Bio</th>
                    <td>{{ data.0.bio }}</td>
                </tr>

            </table>
        </form>
    </div>
</div>

</body>
</html>

<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" 
"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Add Tips</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #000000, #1a0000);
        color: white;
    }

    /* Center container */
    .container {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    /* Card UI */
    .card {
        background: rgba(0, 0, 0, 0.75);
        padding: 30px;
        border-radius: 15px;
        width: 400px;
        box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
        backdrop-filter: blur(10px);
    }

    .card h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #ff0000;
        text-shadow: 0 0 10px rgba(255,0,0,0.7);
    }

    label {
        font-size: 14px;
        display: block;
        margin-bottom: 5px;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: none;
        outline: none;
        background: rgba(255,255,255,0.1);
        color: white;
    }

    input:focus, textarea:focus {
        box-shadow: 0 0 8px red;
    }

    /* Button */
    .btn {
        width: 100%;
        padding: 12px;
        background: red;
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #ff1a1a;
        box-shadow: 0 0 12px red;
    }

</style>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>Add Tips</h2>

        <form id="form1" name="form1" method="post" action="/tipsAdd_post/{{ id }}" enctype="multipart/form-data">

            <label>Title</label>
            <input type="text" name="textfield1" placeholder="Enter title" required />

            <label>Tips</label>
            <textarea name="textfield2" rows="4" placeholder="Enter tips..." required></textarea>

            <label>Date</label>
            <input type="date" name="textfield3" required />

            <input type="submit" name="button" value="Add Tips" class="btn" />

        </form>
    </div>
</div>

</body>
</html>
